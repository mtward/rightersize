---
- name: Collect SAR-based right-sizing recommendations (per host)
  hosts: all
  become: true
  gather_facts: false
  serial: 50

  vars:
    rs_days: 30

    cpu_percentile: 95
    mem_percentile: 99

    # Balanced-style targets: keep CPU <= ~70% most of the time, plus headroom.
    cpu_target_util: 0.70
    cpu_headroom: 0.20
    mem_headroom: 0.20

    # Add some OS/daemon reserve so we don't cut too close
    os_reserve_mb: 1024

    # Where results will be stored on your control node
    output_dir_local: "/var/tmp/rightsizing-results"

  tasks:
    - name: Install SAR right-sizing analyzer
      ansible.builtin.copy:
        dest: /usr/local/sbin/rightsizing_sar.py
        owner: root
        group: root
        mode: "0755"
        src: rightsizing_sar.py

    - name: Run analyzer to generate /var/tmp/rightsizing.json
      ansible.builtin.command: >
        /usr/bin/python3 sar2rightsize.py
        --days {{ rs_days }}
        --cpu-percentile {{ cpu_percentile }}
        --mem-percentile {{ mem_percentile }}
        --cpu-target {{ cpu_target_util }}
        --cpu-headroom {{ cpu_headroom }}
        --mem-headroom {{ mem_headroom }}
        --os-reserve-mb {{ os_reserve_mb }}
        --out /var/tmp/rightsizing.json
      register: rs_out
      changed_when: true

    - name: Fetch JSON result to control node
      ansible.builtin.fetch:
        src: /var/tmp/rightsizing.json
        dest: "{{ output_dir_local }}/{{ inventory_hostname }}.json"
        flat: true
...
